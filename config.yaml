# ── Massive / Polygon (US Stocks + Indices) ────────────────────────────────
# Requires a Polygon.io API key.
# One goroutine is spawned per key → more keys = faster crawl.
# Set via env: POLYGON_API_KEYS=key1,key2  (or POLYGON_API_KEY for a single key)
# Free tier: 1 key, 5 req/min (12 s cooldown).
massive:
  baseUrl: "https://api.polygon.io"
  keys: []              # set via POLYGON_API_KEYS env — never commit keys
  workers: 0            # 0 = one goroutine per key (default); set higher on pro plan (e.g. 1 key × 5 workers)
  rateLimit: 12         # seconds between requests per worker; free tier = 5 req/min → 12s cooldown
  schedule:
    runHour: 4          # UTC — 04:00 UTC = 11:00 Vietnam (UTC+7)
    runMinute: 0        # US markets close ~8 PM ET; +8h buffer to settle


# ── Binance (Crypto, public API — no key required) ─────────────────────────
binance:
  baseUrl: "https://api.binance.com"
  # Rate limit: ~1200 weight/min per IP; each klines call = 2 weight.
  # workers=3 → ~100 req/min → safe headroom. Do NOT set > 10.
  workers: 3
  rateLimit: 0          # no per-request delay needed; weight budget handles it
  schedule:
    runHour: 0          # UTC midnight — crypto trades 24/7, run at day rollover
    runMinute: 30


# ── TwelveData (Forex + multi-asset — requires API key) ────────────────────
# Replaces HistData for forex; also supports stocks, ETFs, indices, crypto.
# Set via env: TWELVEDATA_API_KEY=your_key
# Free tier: 8 req/min, 800 credits/day (1 credit per request) → workers: 1
# Paid tiers allow higher concurrency.
twelvedata:
  baseUrl: "https://api.twelvedata.com"
  workers: 1            # free tier: 8 req/min max; 1 worker is safest
  rateLimit: 8          # seconds between requests; free tier = 8 req/min → ~7.5s, use 8 to be safe
  schedule:
    runHour: 1          # UTC — forex market closes Friday 5 PM ET
    runMinute: 0


# ── VCI / Vietcap (Vietnamese stocks — no API key) ─────────────────────────
vci:
  baseUrl: "https://trading.vietcap.com.vn/api"
  workers: 1            # 1 worker to avoid 429; VCI rate-limits aggressively
  rateLimit: 3          # 1s between tickers; each ticker already makes ~10 HTTP calls (30k bars/req)
  schedule:
    runHour: 9          # UTC — 09:00 UTC = 16:00 Vietnam; HOSE closes 15:00 local
    runMinute: 30


# ── Global fallback schedule ───────────────────────────────────────────────
# Used only for providers that do not set their own schedule block.
schedule:
  runHour: 0
  runMinute: 30


# ── Global data settings ───────────────────────────────────────────────────
data:
  dir: /mallow/data             # root output directory; relative or absolute (e.g. ../data, /mnt/storage/hist); override via DATA_DIR env
  format: parquet       # parquet | csv | json; override via SAVE_FORMAT env


# ── Asset pipelines ────────────────────────────────────────────────────────
# Each entry = one independent crawl pipeline definition.
# `backfillYears` must be declared at the data type level or overridden per frame.
# Each frame expands into its own runtime pipeline key: "provider:class:frame".
# `sinkFrames` on a frame derives additional timeframes from M1 source data.
# Legacy fields (`timespan`, `interval`, `timeFrame`) still work during migration.
assets:

  # ── US Stocks via Polygon ─────────────────────────────────────────────────
  - class: stocks
    provider: massive
    backfillYears: 2    # Polygon has 10+ years; 2y covers 1 full market cycle
    frames:
      - name: M1
        sinkFrames: [M1, M5, M15, M30, H1, H4]
    enabled: true
    groups:
      #      - sp500           # ~503 stocks, free (GitHub CSV)
      - nasdaq100       # ~101 stocks, free (Wikipedia)
    tickers: []
    validate: false

  # ── US Indices via Polygon (Starter+ plan required) ───────────────────────
  - class: indices
    provider: massive
    backfillYears: 2
    frames:
      - name: M1
        sinkFrames: [M1, M5, M15, M30, H1, H4]
    enabled: false
    groups: []
    tickers:
      - I:SPX           # S&P 500
      - I:NDX           # NASDAQ-100
    validate: false

  # ── Crypto via Binance — multiple frames ─────────────────────────────────
  - class: crypto
    provider: binance
    backfillYears: 4    # crypto: 4y covers 2 halving cycles (2020, 2024)
    frames:
      - name: M1
        sinkFrames: [M1, M5, M15, M30, H1, H4]
      - name: D1
        backfillYears: 7
    enabled: true
    groups: []
    tickers:
      - BTCUSDT
      - ETHUSDT
      - BNBUSDT
      - SOLUSDT
      - XRPUSDT
      - ADAUSDT
      - AVAXUSDT
      - DOTUSDT
      - LINKUSDT
      - MATICUSDT
    validate: false

  # ── Forex via TwelveData — multiple frames ───────────────────────────────
  # Symbol format for TwelveData: "EUR/USD" (with slash)
  - class: forex
    provider: twelvedata
    backfillYears: 10   # TwelveData has forex history back to ~2010
    frames:
      - name: M1
        sinkFrames: [M1, M5, M15, M30, H1, H4]
    enabled: false
    groups: []
    tickers:
      - EUR/USD
      - GBP/USD
      - USD/JPY
      - AUD/USD
      - USD/CHF
    validate: false

  # ── Vietnamese stocks via VCI — multiple frames ──────────────────────────
  - class: vn
    provider: vci
    backfillYears: 3    # VCI minute history is roughly 2.5y
    frames:
      - name: M1
        sinkFrames: [M1, M5, M15, M30, H1, H4]
      - name: D1
        backfillYears: 25
    enabled: true
    groups:
      - VN30
      # - VN100
    tickers: []
    validate: false


# ── Logging ────────────────────────────────────────────────────────────────
log:
  level: info           # debug | info | warn | error; override via LOG_LEVEL env
  format: json          # text (dev) | json (production)
  file: "data/app.log"  # also written to stderr; remove to log stderr only
