# ── Massive / Polygon (US Stocks + Indices) ────────────────────────────────
# Requires a Polygon.io API key.
# One goroutine is spawned per key → more keys = faster crawl.
# Set via env: POLYGON_API_KEYS=key1,key2  (or POLYGON_API_KEY for a single key)
# Free tier: 1 key, 5 req/min (12 s cooldown).
massive:
  baseUrl: "https://api.polygon.io"
  workers: 0            # 0 = one goroutine per key (default); set higher on pro plan (e.g. 1 key × 5 workers)
  rateLimit: 12         # seconds between requests per worker; free tier = 5 req/min → 12s cooldown
  schedule:
    runHour: 4          # UTC — 04:00 UTC = 11:00 Vietnam (UTC+7)
    runMinute: 0        # US markets close ~8 PM ET; +8h buffer to settle


# ── Binance (Crypto, REST API — no key required) ────────────────────────────
binance:
  baseUrl: "https://api.binance.com"
  workers: 1
  rateLimit: 1          # seconds between requests
  schedule:
    runHour: 0
    runMinute: 30


# ── BinanceFlat (Crypto, flat-file CDN — no key, no rate limit) ─────────────
binanceflat:
  baseUrl: "https://data.binance.vision"  # flat-file CDN; override only for testing
  workers: 5            # parallel monthly-ZIP downloads per symbol; CDN has no rate limit
  schedule:
    runHour: 0          # UTC midnight — crypto trades 24/7, run at day rollover
    runMinute: 30


# ── OKX (Crypto, public API — no key required) ────────────────────────────
okx:
  baseUrl: "https://www.okx.com"
  workers: 1
  rateLimit: 0          # inter-symbol delay; per-request throttle (50ms) handled inside crawler
  schedule:
    runHour: 0          # UTC midnight — crypto 24/7, run at day rollover
    runMinute: 45       # offset from Binance (00:30) to avoid concurrent I/O


# ── TwelveData (Forex + multi-asset — requires API key) ────────────────────
# Replaces HistData for forex; also supports stocks, ETFs, indices, crypto.
# Set via env: TWELVEDATA_API_KEY=your_key
# Free tier: 8 req/min, 800 credits/day (1 credit per request) → workers: 1
# Paid tiers allow higher concurrency.
twelvedata:
  baseUrl: "https://api.twelvedata.com"
  workers: 1            # free tier: 8 req/min max; 1 worker is safest
  rateLimit: 8          # seconds between requests; free tier = 8 req/min → ~7.5s, use 8 to be safe
  schedule:
    runHour: 1          # UTC — forex market closes Friday 5 PM ET
    runMinute: 0


# ── VCI / Vietcap (Vietnamese stocks — no API key) ─────────────────────────
vci:
  baseUrl: "https://trading.vietcap.com.vn/api"
  workers: 1            # 1 worker to avoid 429; VCI rate-limits aggressively
  rateLimit: 3          # 1s between tickers; each ticker already makes ~10 HTTP calls (30k bars/req)
  schedule:
    runHour: 9          # UTC — 09:00 UTC = 16:00 Vietnam; HOSE closes 15:00 local
    runMinute: 30


# ── Global fallback schedule ───────────────────────────────────────────────
# Used only for providers that do not set their own schedule block.
schedule:
  runHour: 0
  runMinute: 30


# ── Global data settings ───────────────────────────────────────────────────
data:
  dir: data             # relative → anchored to dir of config.yaml (repo root); absolute → kept as-is (Docker); override via DATA_DIR env
  format: parquet       # parquet | csv | JSON; override via SAVE_FORMAT env


# ── Asset pipelines ────────────────────────────────────────────────────────
# Each entry = one independent crawl pipeline definition.
# `backfillYears` is set per frame: 0 = full history (crawler self-resolves
# via provider listTime / onboardDate / backward pagination); >0 = limit to N
# years from asOf.
# Each frame expands into its own runtime pipeline key: "provider:class:frame".
# `sinkFrames` on a frame derives additional timeframes from M1 source data.
# Legacy fields (`timespan`, `interval`, `timeFrame`) still work during migration.
assets:

  # ── US Stocks via Polygon — EOD only ─────────────────────────────────────
  - class: stocks
    provider: massive
    frames:
      - name: M1
        sinkFrames: [M1, M5, M15, M30, H1, H4]
        from: "2024-05"
      - name: D1
        from: "2024-01"     # Polygon free tier ≈ 5y
    enabled: false
    groups:
      #      - sp500           # ~503 stocks, free (GitHub CSV)
      - nasdaq100       # ~101 stocks, free (Wikipedia)
    tickers: []
    validate: false

  # ── Crypto via Binance REST API (disabled — use binanceflat instead) ────────
  - class: crypto
    provider: binance
    frames:
      - name: D1
        from: ""            # empty = full history
    enabled: false
    groups: []
    tickers:
      - BTCUSDT
    validate: false

  # ── Crypto via BinanceFlat CDN — full history, all timeframes ───────────
  # Binance Vision provides pre-built ZIPs for every interval — no sinkFrames
  # needed; each frame is fetched directly and has canonical Binance data.
  # Use this as the M1+ history source for all cross-listed symbols (BNB, BTC…)
  # even when live-trading on OKX; price correlation is tight enough for M1 strategy.
  - class: crypto
    provider: binanceflat
    frames:
      - name: M1
        from: ""            # full history from 2017 (pre-listing months skipped via 404)
      - name: M5
        from: ""
      - name: M15
        from: ""
      - name: M30
        from: ""
      - name: H1
        from: ""
      - name: H4
        from: ""
      - name: D1
        from: ""
    enabled: true
    groups: []
    tickers:
      - BTCUSDT
      - ETHUSDT
      - BNBUSDT
      - SOLUSDT
      - XRPUSDT
      - ADAUSDT
      - AVAXUSDT
      - DOTUSDT
      - LINKUSDT
      - MATICUSDT
    validate: false

  # ── Crypto via OKX — D1 only (M1 history from BinanceFlat above) ─────────
  - class: crypto
    provider: okx
    frames:
      - name: D1
        from: ""            # full history (resolved via /public/instruments listTime)
    enabled: true
    groups: []
    tickers:
      - BTC-USDT
      - ETH-USDT
      - BNB-USDT
      - SOL-USDT
      - XRP-USDT
      - ADA-USDT
      - AVAX-USDT
      - DOT-USDT
      - LINK-USDT
      - POL-USDT
    validate: false

  # ── Forex via TwelveData — EOD only ──────────────────────────────────────
  # Symbol format for TwelveData: "EUR/USD" (with slash)
  - class: forex
    provider: twelvedata
    frames:
      - name: D1
        from: "2010"        # TwelveData forex history back to ~2010
    enabled: false
    groups: []
    tickers:
      - EUR/USD
      - GBP/USD
      - USD/JPY
      - AUD/USD
      - USD/CHF
    validate: false

  # ── Vietnamese stocks via VCI — EOD only ────────────────────────────────
  - class: vn
    provider: vci
    frames:
      - name: D1
#        sinkFrames: [W1, MN]
        from: "2000"        # VCI daily history ≈ 25y
      - name: M1
        sinkFrames: [M1, M5, M15, M30, H1, H4]
        from: "2023-01"     # VCI minute history ≈ 1y
    enabled: false
    groups:
      - VN30
      # - VN100
    tickers: []
    validate: false


# ── Logging ────────────────────────────────────────────────────────────────
log:
  level: debug           # debug | info | warn | error; override via LOG_LEVEL env
  format: text          # text (dev) | JSON (production)
  file: "data/app.log"  # also written to stderr; remove to log stderr only
