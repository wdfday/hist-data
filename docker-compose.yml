services:
  crawler:
    build:
      context: .
      dockerfile: Dockerfile
    image: us-data-crawler:latest
    container_name: us-data-crawler
    environment:
      # Secrets — never put API keys in config.yaml
      - POLYGON_API_KEYS=${POLYGON_API_KEYS}
      # Optional overrides (values in config.yaml take effect if these are unset)
      # - LOG_LEVEL=debug
      # - DATA_DIR=/app/data
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ${DATA_DIR_HOST:-./data}:/app/data
    restart: unless-stopped

networks:
  default:
    name: us-data-network
