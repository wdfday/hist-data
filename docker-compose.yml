services:
  hist-data:
    build:
      context: .
      dockerfile: Dockerfile
    image: hist-data:latest
    container_name: hist-data
    environment:
      # ── Secrets — never put API keys in config.yaml ────────────────────────
      # Polygon.io (massive): comma-separated, one goroutine per key
      - POLYGON_API_KEYS=${POLYGON_API_KEYS:-}
      # TwelveData: forex + multi-asset (disabled by default in config.yaml)
      - TWELVEDATA_API_KEY=${TWELVEDATA_API_KEY:-}
      # ── Optional runtime overrides ─────────────────────────────────────────
      # - LOG_LEVEL=debug
      # - DATA_DIR=/app/data
      # - SAVE_FORMAT=parquet
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ${DATA_DIR_HOST:-./data}:/app/data
    restart: unless-stopped

networks:
  default:
    name: hist-data-network
